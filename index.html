<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote Notes</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

	<div class="templatecontainer">
		<button id="closeTemplates">Close Templates</button>
		<input type="file" id="fileInput" multiple>

		<div class="templatetab">
			<div class="templatebackground">

				<!-- Nav buttons built by JS from templates.json -->
				<div class="navbuttons" id="navbuttons"></div>

				<!-- Template text built by JS -->
				<div class="display" id="templateDisplay">
					<p id="activeTemplate"></p>
				</div>

				<!-- Single copy button, reused for whichever template is active -->
				<button id="copyButton">Copy Template</button>

			</div>
		</div>
	</div>

	<div class="quotenotes">

		<div class="title">
			<h1>Quote Notes</h1>
		</div>

		<form id="contactInfo">
			<label for="name">Name :</label>
			<input name="name" type="text">

			<label for="email">Email :</label>
			<input name="email" type="email">

			<label for="location">Location :</label>
			<input name="location" type="text">
		</form>

		<div class="timeline">
			<button>Jan</button>
			<button>Feb</button>
			<button>Mar</button>
			<button>Apr</button>
			<button>May</button>
			<button>Jun</button>
			<button>Jul</button>
			<button>Aug</button>
			<button>Sep</button>
			<button>Oct</button>
			<button>Nov</button>
			<button>Dec</button>
		</div>

		<div class="dashboard" id="dashboard">
			<h3>Notes :</h3>
		</div>

		<div class="buildingfeatures">
			<form id="buildingfeatures">
				<label for="feature">Building Features :</label>
				<input name="feature" type="text">

				<div class="quotecountcontainer">
					<div class="quotecount"></div>
					<button id="addnote" type="submit">Add Note</button>
					<button id="clearButton" type="button">Clear</button>
				</div>
			</form>
		</div>

	</div>

	<button id="templates">Email Templates</button>

	<script src="script.js"></script>
</body>
</html>
